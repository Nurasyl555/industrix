basePath: /api/v1
definitions:
  errors.Code:
    enum:
    - NOT_FOUND
    - UNAUTHORIZED
    - VALIDATION
    - CONFLICT
    - INTERNAL
    type: string
    x-enum-varnames:
    - CodeNotFound
    - CodeUnauthorized
    - CodeValidation
    - CodeConflict
    - CodeInternal
  errors.Error:
    properties:
      code:
        $ref: '#/definitions/errors.Code'
      details:
        additionalProperties: true
        type: object
      err: {}
      message:
        type: string
    type: object
  identity.EmailLoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  identity.EmailRegisterRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  identity.PhoneLoginRequest:
    properties:
      phone:
        type: string
    type: object
  identity.RefreshRequest:
    properties:
      refresh_token:
        type: string
    type: object
  identity.UpdateProfileRequest:
    properties:
      first_name:
        type: string
      last_name:
        type: string
    type: object
  identity.User:
    properties:
      avatar_url:
        type: string
      company_id:
        type: string
      created_at:
        type: string
      email:
        type: string
      first_name:
        type: string
      id:
        type: string
      last_name:
        type: string
      phone:
        type: string
      role:
        type: string
      updated_at:
        type: string
      verified:
        type: boolean
    type: object
  identity.VerifyOTPRequest:
    properties:
      code:
        type: string
      phone:
        type: string
    type: object
  integrity.Company:
    properties:
      address:
        type: string
      bin:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      owner_id:
        type: string
      phone:
        type: string
      reputation_score:
        type: number
      reviewer_note:
        type: string
      status:
        $ref: '#/definitions/integrity.CompanyStatus'
      updated_at:
        type: string
      user_id:
        type: string
      verified:
        type: boolean
      website:
        type: string
    type: object
  integrity.CompanyStatus:
    enum:
    - pending
    - verified
    - rejected
    type: string
    x-enum-varnames:
    - StatusPending
    - StatusVerified
    - StatusRejected
  integrity.CreateCompanyRequest:
    properties:
      address:
        type: string
      bin:
        type: string
      email:
        type: string
      name:
        type: string
      phone:
        type: string
      website:
        type: string
    type: object
  integrity.UpdateCompanyRequest:
    properties:
      address:
        type: string
      email:
        type: string
      name:
        type: string
      phone:
        type: string
      website:
        type: string
    type: object
  jwt.TokenPair:
    properties:
      accessToken:
        type: string
      refreshToken:
        type: string
    type: object
  marketplace.CreateReviewRequest:
    properties:
      comment:
        type: string
      rating:
        type: integer
      target_entity_id:
        type: string
      transaction_id:
        type: string
    type: object
  marketplace.ReputationScore:
    properties:
      average_rating:
        type: number
      entity_id:
        type: string
      review_count:
        type: integer
      tier:
        description: gold, silver, bronze, none
        type: string
    type: object
  marketplace.Review:
    properties:
      author_id:
        type: string
      comment:
        type: string
      created_at:
        type: string
      id:
        type: string
      rating:
        type: integer
      target_entity_id:
        type: string
      transaction_id:
        type: string
      updated_at:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Industrix Industrial Equipment Marketplace API
  title: Industrix API
  version: "1.0"
paths:
  /auth/email/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/identity.EmailLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jwt.TokenPair'
      summary: Login user via Email
      tags:
      - auth
  /auth/email/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Registration details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/identity.EmailRegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.Error'
      summary: Register a new user via Email
      tags:
      - auth
  /auth/oauth/google:
    get:
      responses: {}
      summary: Redirect to Google OAuth consent screen
      tags:
      - auth
  /auth/oauth/google/callback:
    get:
      parameters:
      - description: OAuth code
        in: query
        name: code
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jwt.TokenPair'
      summary: Handle Google OAuth callback and get tokens
      tags:
      - auth
  /auth/phone/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Phone number
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/identity.PhoneLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Request OTP for Phone login/registration
      tags:
      - auth
  /auth/phone/verify:
    post:
      consumes:
      - application/json
      parameters:
      - description: OTP details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/identity.VerifyOTPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jwt.TokenPair'
      summary: Verify phone OTP and get tokens
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/identity.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jwt.TokenPair'
      summary: Refresh token
      tags:
      - auth
  /companies:
    post:
      consumes:
      - application/json
      parameters:
      - description: Company details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/integrity.CreateCompanyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/integrity.Company'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.Error'
      security:
      - BearerAuth: []
      summary: Create a company
      tags:
      - companies
  /companies/{id}:
    get:
      parameters:
      - description: Company ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/integrity.Company'
      summary: Get company details
      tags:
      - companies
    put:
      parameters:
      - description: Company ID
        in: path
        name: id
        required: true
        type: string
      - description: Updated details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/integrity.UpdateCompanyRequest'
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/integrity.Company'
      security:
      - BearerAuth: []
      summary: Update company details
      tags:
      - companies
  /reviews:
    post:
      consumes:
      - application/json
      parameters:
      - description: Review details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/marketplace.CreateReviewRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/marketplace.Review'
      security:
      - BearerAuth: []
      summary: Create a review
      tags:
      - reviews
  /reviews/{entityID}:
    get:
      parameters:
      - description: Entity ID
        in: path
        name: entityID
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: List reviews
      tags:
      - reviews
  /reviews/{entityID}/reputation:
    get:
      parameters:
      - description: Entity ID
        in: path
        name: entityID
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/marketplace.ReputationScore'
      summary: Get reputation score
      tags:
      - reviews
  /users/me:
    get:
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/identity.User'
      security:
      - BearerAuth: []
      summary: Get current user profile
      tags:
      - users
    put:
      parameters:
      - description: Updated profile
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/identity.UpdateProfileRequest'
      responses:
        "200":
          description: OK
      security:
      - BearerAuth: []
      summary: Update user profile
      tags:
      - users
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
