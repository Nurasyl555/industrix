syntax = "proto3";

package identity.v1;

option go_package = "github.com/industrix/gen/go/identity/v1;identityv1";

// ============ Messages ============

message User {
  string id = 1;
  string email = 2;
  string phone = 3;
  string first_name = 4;
  string last_name = 5;
  string role = 6;
  bool verified = 7;
  string company_id = 8;
  int64 created_at = 9;
  int64 updated_at = 10;
}

message Company {
  string id = 1;
  string name = 2;
  string bin = 3;
  string address = 4;
  string phone = 5;
  string email = 6;
  string website = 7;
  bool verified = 8;
  string subscription_plan = 9;
  int64 created_at = 10;
  int64 updated_at = 11;
}

message Claims {
  string user_id = 1;
  string company_id = 2;
  string role = 3;
  bool verified = 4;
  repeated string scope = 5;
  int64 exp = 6;
  int64 iat = 7;
}

message GetUserRequest {
  string id = 1;
}

message GetUserResponse {
  User user = 1;
}

message GetCompanyRequest {
  string id = 1;
}

message GetCompanyResponse {
  Company company = 1;
}

message VerifyTokenRequest {
  string token = 1;
}

message VerifyTokenResponse {
  Claims claims = 1;
  bool valid = 2;
}

message GetUserBatchRequest {
  repeated string ids = 1;
}

message GetUserBatchResponse {
  repeated User users = 1;
}

// ============ Service ============

service IdentityService {
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc GetCompany(GetCompanyRequest) returns (GetCompanyResponse);
  rpc VerifyToken(VerifyTokenRequest) returns (VerifyTokenResponse);
  rpc GetUserBatch(GetUserBatchRequest) returns (GetUserBatchResponse);
}
