syntax = "proto3";

package inventory.v1;

option go_package = "github.com/industrix/gen/go/inventory/v1;inventoryv1";

service InventoryService {
  rpc GetEquipment(GetEquipmentRequest) returns (Equipment);
  rpc ValidateAttributes(ValidateAttributesRequest) returns (ValidationResult);
  rpc GetCategorySchema(GetCategorySchemaRequest) returns (CategorySchema);
  rpc SearchEquipment(SearchEquipmentRequest) returns (SearchResults);
  rpc IndexEquipment(IndexEquipmentRequest) returns (IndexResult);
}

message Equipment {
  string id = 1;
  string title = 2;
  string description = 3;
  string category_id = 4;
  double price = 5;
  string currency = 6; // KZT, USD, EUR
  string location_id = 7;
  repeated string media_urls = 8;
  map<string, string> attributes = 9;
}

message GetEquipmentRequest {
  string id = 1;
}

message ValidateAttributesRequest {
  string category_id = 1;
  map<string, string> attributes = 2;
}

message ValidationResult {
  bool valid = 1;
  repeated string errors = 2;
}

message GetCategorySchemaRequest {
  string category_id = 1;
}

message CategorySchema {
  string id = 1;
  string name_ru = 2;
  string name_kk = 3;
  repeated AttributeSchema attributes = 4;
}

message AttributeSchema {
  string key = 1;
  string label_ru = 2;
  string label_kk = 3;
  string type = 4; // string, number, boolean, select
  bool required = 5;
  repeated string options = 6;
}

message SearchEquipmentRequest {
  string query = 1;
  string category_id = 2;
  double min_price = 3;
  double max_price = 4;
  string location_id = 5;
  int32 page = 6;
  int32 page_size = 7;
}

message SearchResults {
  repeated Equipment items = 1;
  int64 total_count = 2;
}

message IndexEquipmentRequest {
  Equipment equipment = 1;
}

message IndexResult {
  bool success = 1;
  string error_message = 2;
}
