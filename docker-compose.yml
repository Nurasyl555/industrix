# Full local stack - all services + infrastructure
# Run with: docker-compose up -d


services:
  # Frontend
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      - gateway

  # API Gateway
  gateway:
    build: ./backend/services/gateway
    ports:
      - "8080:8080"
    environment:
      - ENV=development

  # ... (all other services defined here with pattern: build: ./backend/services/<service-name>)
  # identity, catalog, listing, search, booking, deal, payment, document, review,
  # services-marketplace, chat, notification, engagement, integrity, media, analytics, admin


  # Infrastructure
  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=devpassword

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  kafka:
    image: confluentinc/cp-kafka:latest
    ports:
      - "9092:9092"
    environment:
      - KAFKA_BROKER_ID=1
