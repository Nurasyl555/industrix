# Full local stack - all services + infrastructure
# Run with: docker-compose up -d
version: "3.8"

services:
  # Frontend
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      # Server-side (proxy route) reaches the backend over the docker network.
      # The browser still uses the baked-in NEXT_PUBLIC_API_URL (localhost).
      - BACKEND_INTERNAL_URL=http://backend:8080/api/v1
    depends_on:
      - backend

  # Backend (Modular Monolith)
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - ENV=development
      - DB_DSN=postgres://postgres:devpassword@postgres:5432/trust_db?sslmode=disable
      - REDIS_HOST=redis
      - KAFKA_BROKERS=kafka:29092
      # Backend → MinIO over the docker network; presigned URLs are signed for
      # the browser-facing host (see modules/media).
      - MINIO_ENDPOINT=minio:9000
      - MINIO_PUBLIC_ENDPOINT=localhost:9000
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=minio123
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      minio:
        condition: service_healthy

  # Include infrastructure services
  postgres:
    extends:
      file: docker-compose.infra.yml
      service: postgres
  mongodb:
    extends:
      file: docker-compose.infra.yml
      service: mongodb
  redis:
    extends:
      file: docker-compose.infra.yml
      service: redis
  kafka:
    extends:
      file: docker-compose.infra.yml
      service: kafka
  zookeeper:
    extends:
      file: docker-compose.infra.yml
      service: zookeeper
  opensearch:
    extends:
      file: docker-compose.infra.yml
      service: opensearch
  minio:
    extends:
      file: docker-compose.infra.yml
      service: minio

volumes:
  postgres_data:
  mongodb_data:
  redis_cache_data:
  kafka_data:
  opensearch_data:
  minio_data:
