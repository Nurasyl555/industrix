# Full local stack - all services + infrastructure
# Run with: docker-compose up -d
version: "3.8"

services:
  # Frontend
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      - backend

  # Backend (Modular Monolith)
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - ENV=development
      - DB_DSN=postgres://postgres:devpassword@postgres:5432/trust_db?sslmode=disable
      - REDIS_HOST=redis
      - KAFKA_BROKERS=kafka:29092
    depends_on:
      - postgres
      - redis
      - kafka

  # Include infrastructure services
  postgres:
    extends:
      file: docker-compose.infra.yml
      service: postgres
  mongodb:
    extends:
      file: docker-compose.infra.yml
      service: mongodb
  redis:
    extends:
      file: docker-compose.infra.yml
      service: redis
  kafka:
    extends:
      file: docker-compose.infra.yml
      service: kafka
  zookeeper:
    extends:
      file: docker-compose.infra.yml
      service: zookeeper
  opensearch:
    extends:
      file: docker-compose.infra.yml
      service: opensearch
  minio:
    extends:
      file: docker-compose.infra.yml
      service: minio

volumes:
  postgres_data:
  mongodb_data:
  redis_cache_data:
  kafka_data:
  opensearch_data:
  minio_data:
