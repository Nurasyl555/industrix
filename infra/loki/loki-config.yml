# Loki configuration
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: boltdb-shipper
      object_store: filesystem
      schema: v11
      index:
        prefix: index_
        period: 24h

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  ingestion_rate_mb: 50
  ingestion_burst_size_mb: 100

analytics:
  reporting_enabled: false

# Log levels configuration
log_level: info

# Promtail configuration for collecting logs
promtail:
  config:
    server:
      http_listen_port: 9080
      grpc_listen_port: 9081
    clients:
      - url: http://localhost:3100/loki/api/v1/push
    scrape_configs:
      - job_name: system
        static_configs:
          - targets:
              - localhost
            labels:
              job: system
              __path__: /var/log/*.log
      - job_name: gateway
        static_configs:
          - targets:
              - gateway
            labels:
              job: gateway
              service: gateway
      - job_name: identity
        static_configs:
          - targets:
              - identity
            labels:
              job: identity
              service: identity
      - job_name: catalog
        static_configs:
          - targets:
              - catalog
            labels:
              job: catalog
              service: catalog
      - job_name: listing
        static_configs:
          - targets:
              - listing
            labels:
              job: listing
              service: listing
      - job_name: deal
        static_configs:
          - targets:
              - deal
            labels:
              job: deal
              service: deal
      - job_name: chat
        static_configs:
          - targets:
              - chat
            labels:
              job: chat
              service: chat
