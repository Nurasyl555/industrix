# Prometheus configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'industrix'
    environment: 'development'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Backend services
  - job_name: 'gateway'
    static_configs:
      - targets: ['gateway:8080']
    metrics_path: '/metrics'

  - job_name: 'identity'
    static_configs:
      - targets: ['identity:8081']
    metrics_path: '/metrics'

  - job_name: 'catalog'
    static_configs:
      - targets: ['catalog:8082']
    metrics_path: '/metrics'

  - job_name: 'listing'
    static_configs:
      - targets: ['listing:8083']
    metrics_path: '/metrics'

  - job_name: 'search'
    static_configs:
      - targets: ['search:8084']
    metrics_path: '/metrics'

  - job_name: 'booking'
    static_configs:
      - targets: ['booking:8085']
    metrics_path: '/metrics'

  - job_name: 'deal'
    static_configs:
      - targets: ['deal:8086']
    metrics_path: '/metrics'

  - job_name: 'payment'
    static_configs:
      - targets: ['payment:8087']
    metrics_path: '/metrics'

  - job_name: 'document'
    static_configs:
      - targets: ['document:8088']
    metrics_path: '/metrics'

  - job_name: 'review'
    static_configs:
      - targets: ['review:8089']
    metrics_path: '/metrics'

  - job_name: 'services-marketplace'
    static_configs:
      - targets: ['services-marketplace:8090']
    metrics_path: '/metrics'

  - job_name: 'chat'
    static_configs:
      - targets: ['chat:8091']
    metrics_path: '/metrics'

  - job_name: 'notification'
    static_configs:
      - targets: ['notification:8092']
    metrics_path: '/metrics'

  - job_name: 'engagement'
    static_configs:
      - targets: ['engagement:8093']
    metrics_path: '/metrics'

  - job_name: 'integrity'
    static_configs:
      - targets: ['integrity:8094']
    metrics_path: '/metrics'

  - job_name: 'media'
    static_configs:
      - targets: ['media:8095']
    metrics_path: '/metrics'

  - job_name: 'analytics'
    static_configs:
      - targets: ['analytics:8096']
    metrics_path: '/metrics'

  - job_name: 'admin'
    static_configs:
      - targets: ['admin:8097']
    metrics_path: '/metrics'

  # Infrastructure
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # Kafka
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-exporter:9308']

  # OpenSearch
  - job_name: 'opensearch'
    static_configs:
      - targets: ['opensearch:9200']
    metrics_path: '/_prometheus/metrics'

  # NGINX
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']
