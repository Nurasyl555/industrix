# NOT LOADED (moved out of conf.d/ — nginx only includes conf.d/*.conf, not subdirs).
# For the future microservices split (chat/gRPC gateway/media modules) —
# none of those exist yet in the modular monolith. Also references an
# upstream "gateway" host that has no matching docker-compose service today.
#
# WebSocket proxy configuration for Chat Service
server {
    listen 80;
    server_name ws.industrix.local;

    # Increase buffer sizes for WebSocket
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;

    # WebSocket location
    location / {
        proxy_pass http://gateway_backend;
        proxy_http_version 1.1;
        
        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Pass original headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Trace-ID $http_x_trace_id;
        
        # WebSocket timeouts (longer than regular HTTP)
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
        
        # Disable buffering for real-time messaging
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Prevent connection closed
        proxy_set_header Connection "";
    }

    # Health check for WebSocket endpoint
    location /health {
        proxy_pass http://gateway_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
