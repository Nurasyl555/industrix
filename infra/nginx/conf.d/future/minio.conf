# NOT LOADED (moved out of conf.d/ — nginx only includes conf.d/*.conf, not subdirs).
# For the future microservices split (chat/gRPC gateway/media modules) —
# none of those exist yet in the modular monolith. Also references an
# upstream "gateway" host that has no matching docker-compose service today.
#
# MinIO public bucket proxy configuration
server {
    listen 80;
    server_name s3.industrix.local;

    # Disable buffering for large file downloads
    proxy_request_buffering off;
    proxy_buffering off;

    # Equipment media bucket - public access
    location /equipment-media/ {
        proxy_pass http://minio:9000/equipment-media/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # CORS headers
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Amz-Date, X-Amz-Security-Token" always;
        
        # Handle CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Amz-Date, X-Amz-Security-Token";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
        
        # Cache images
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # All buckets (authenticated access)
    location / {
        proxy_pass http://minio:9000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Timeouts for large uploads/downloads
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Disable caching for dynamic content
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
