# NOT LOADED (moved out of conf.d/ — nginx only includes conf.d/*.conf, not subdirs).
# For the future microservices split (chat/gRPC gateway/media modules) —
# none of those exist yet in the modular monolith. Also references an
# upstream "gateway" host that has no matching docker-compose service today.
#
# API Gateway proxy configuration
server {
    listen 80;
    server_name api.industrix.local localhost;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Rate limiting at edge
    limit_req zone=api_limit burst=20 nodelay;
    limit_conn conn_limit 50;

    # Proxy to API Gateway
    location / {
        proxy_pass http://gateway_backend;
        proxy_http_version 1.1;
        
        # Headers forwarding
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Trace-ID $http_x_trace_id;
        
        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Connection management
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Health check endpoint (bypasses rate limiting)
    location /health {
        proxy_pass http://gateway_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        
        # No rate limiting for health checks
        limit_req zone=none;
    }

    # gRPC endpoint
    location /grpc {
        grpc_pass grpc://gateway_backend;
        
        # gRPC specific headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Timeouts for gRPC
        grpc_connect_timeout 10s;
        grpc_send_timeout 60s;
        grpc_read_timeout 60s;
    }
}
