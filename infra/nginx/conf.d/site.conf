# Main site config for the MVP: one domain, TLS, path-based routing to the
# two real services in docker-compose.prod.yml (backend + frontend).
#
# SETUP: replace every "YOUR_DOMAIN_HERE" below with your actual domain
# (e.g. industrix.kz), then issue a cert with certbot before nginx can
# start in HTTPS mode — see infra/nginx/README.md for the exact commands.

# Redirect all plain HTTP to HTTPS, except the certbot ACME challenge path
# (certbot needs to answer over plain HTTP to prove domain ownership).
server {
    listen 80;
    server_name YOUR_DOMAIN_HERE;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name YOUR_DOMAIN_HERE;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN_HERE/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN_HERE/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Backend API — everything the frontend's NEXT_PUBLIC_API_URL and the
    # browser hit directly (public GETs bypass the /api/proxy Next.js route).
    location /api/v1/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 50;

        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://backend_upstream/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /swagger/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Everything else — the Next.js app (including its own /api/* routes,
    # e.g. /api/auth/session and /api/proxy/*, which run server-side in the
    # frontend container itself, not the Go backend).
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
