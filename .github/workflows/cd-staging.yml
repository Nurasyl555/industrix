# CD Workflow - Deploy to staging on merge to main
#
# Requires these GitHub Secrets to be set before this can deploy anywhere
# (Settings -> Secrets and variables -> Actions):
#   STAGING_HOST     - server IP or hostname
#   STAGING_USER     - SSH user (e.g. deploy)
#   STAGING_SSH_KEY  - private key for that user (PEM format)
#
# Also set this repo Variable (Settings -> Secrets and variables -> Actions
# -> Variables tab — not Secrets, it ends up in public client JS anyway):
#   PUBLIC_API_URL   - e.g. https://staging.industrix.kz/api/v1
# NEXT_PUBLIC_API_URL is baked into the frontend bundle at build time, so it
# has to be passed as a build-arg here, not set later on the server.
#
# Assumes the server already has:
#   - Docker + the Docker Compose plugin installed
#   - a git clone of this repo at ~/industrix
#   - a backend/.env file with real secrets (JWT keys, DB_DSN, etc.),
#     not committed to the repo — see .env.example for the full list
#
# Until those secrets exist, this workflow will just fail at the "Deploy"
# step — the build-and-push part works standalone and can be verified early.

name: CD Staging

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/industrix-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/industrix-frontend

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:staging
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.PUBLIC_API_URL }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:staging
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Staging
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd ~/industrix
            git pull origin main
            export GHCR_OWNER=${{ github.repository_owner }}
            export IMAGE_TAG=${{ github.sha }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
