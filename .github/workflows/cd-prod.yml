# CD Workflow - Deploy to prod on release tag (e.g. v1.0.0)
#
# Same prerequisites as cd-staging.yml, but pointed at a separate prod
# server via its own secrets:
#   PROD_HOST, PROD_USER, PROD_SSH_KEY
#
# Also set the PUBLIC_API_URL repo Variable — see cd-staging.yml for why.
#
# Trigger: `git tag v1.0.0 && git push origin v1.0.0` (or use the GitHub
# Releases UI to publish a release, which creates the tag for you).

name: CD Production

# Auto-deploy is disabled: there is no production server yet. This workflow now
# only runs when started manually (Actions tab -> "CD Production" -> "Run
# workflow"). To turn it back on for release tags, uncomment the `push`/`tags`
# trigger and set the PROD_* secrets.
on:
  workflow_dispatch:
  # push:
  #   tags:
  #     - "v*"

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/industrix-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/industrix-frontend

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.PUBLIC_API_URL }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production # requires manual approval if configured under Settings -> Environments
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd ~/industrix
            git fetch --tags
            git checkout ${{ github.ref_name }}
            export GHCR_OWNER=${{ github.repository_owner }}
            export IMAGE_TAG=${{ github.ref_name }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
