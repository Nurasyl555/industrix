version: "3.8"

# 1. Connecting to KBTU servers
networks:
  esg-network:
    external: true

services:
  # --- FRONTEND ---
  industrix-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://esg.kbtu.kz/industrix/api/v1
    container_name: industrix-frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - BACKEND_INTERNAL_URL=http://industrix-backend:8080/api/v1
    networks:
      - esg-network
    depends_on:
      - industrix-backend

  # --- BACKEND ---
  industrix-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: industrix-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - ENV=production
      - HTTP_PORT=8080
      - DB_DSN=postgres://postgres:devpassword@industrix-postgres:5432/postgres?sslmode=disable
      - REDIS_HOST=industrix-redis
      - KAFKA_BROKERS=industrix-kafka:29092
      - MONGO_HOST=industrix-mongodb
      - OPENSEARCH_HOSTS=http://industrix-opensearch:9200
      - MINIO_ENDPOINT=industrix-minio:9000
    expose:
      - "8080"
    networks:
      - esg-network
    depends_on:
      industrix-postgres:
        condition: service_healthy
      industrix-redis:
        condition: service_healthy
      industrix-kafka:
        condition: service_started

  # --- POSTGRESQL ---
  industrix-postgres:
    extends:
      file: docker-compose.infra.yml
      service: postgres
    container_name: industrix-postgres
    restart: unless-stopped
    ports: [] 
    expose:
      - "5432"
    networks:
      - esg-network

  # --- REDIS ---
  industrix-redis:
    extends:
      file: docker-compose.infra.yml
      service: redis
    container_name: industrix-redis
    restart: unless-stopped
    ports: []
    expose:
      - "6379"
    networks:
      - esg-network

  # --- MONGODB ---
  industrix-mongodb:
    extends:
      file: docker-compose.infra.yml
      service: mongodb
    container_name: industrix-mongodb
    restart: unless-stopped
    ports: []
    expose:
      - "27017"
    networks:
      - esg-network

  # --- ZOOKEEPER ---
  industrix-zookeeper:
    extends:
      file: docker-compose.infra.yml
      service: zookeeper
    container_name: industrix-zookeeper
    restart: unless-stopped
    ports: []
    expose:
      - "2181"
    networks:
      - esg-network

  # --- KAFKA ---
  industrix-kafka:
    extends:
      file: docker-compose.infra.yml
      service: kafka
    container_name: industrix-kafka
    restart: unless-stopped
    ports: []
    expose:
      - "9092"
      - "29092"
    networks:
      - esg-network

  # --- OPENSEARCH ---
  industrix-opensearch:
    extends:
      file: docker-compose.infra.yml
      service: opensearch
    container_name: industrix-opensearch
    restart: unless-stopped
    ports: []
    expose:
      - "9200"
    networks:
      - esg-network

  # --- MINIO ---
  industrix-minio:
    extends:
      file: docker-compose.infra.yml
      service: minio
    container_name: industrix-minio
    restart: unless-stopped
    ports: []
    expose:
      - "9000"
      - "9001"
    networks:
      - esg-network

  # --- IMGPROXY ---
  industrix-imgproxy:
    extends:
      file: docker-compose.infra.yml
      service: imgproxy
    container_name: industrix-imgproxy
    restart: unless-stopped
    ports: []
    expose:
      - "8080"
    networks:
      - esg-network

volumes:
  postgres_data:
  mongodb_data:
  redis_cache_data:
  redis_session_data:
  kafka_data:
  opensearch_data:
  minio_data: